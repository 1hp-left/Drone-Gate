sim:
  dt_s: 0.05
  image_size: [640, 480]
  image_noise_std: 2.0
  occlusion_prob: 0.0
  dynamics_noise_std: 0.03
  camera:
    fx: 420.0
    fy: 420.0
    cx: 320.0
    cy: 240.0
  gates:
    - center_m: [8.0, 0.0, 0.0]
      width_m: 2.0
      height_m: 2.0
      yaw_rad: 0.0

mission:
  min_detection_confidence: 0.30
  max_lost_steps: 30
  max_retries: 2
  gate_reached_distance_m: 0.8
  gate_exit_distance_m: 1.3

planning:
  approach_distance_m: 2.0
  exit_distance_m: 1.5
  max_velocity_mps: 3.0
  max_accel_mps2: 3.0
  max_yaw_rate_rps: 1.2
  horizon_s: 4.0
  num_points: 35

control:
  kp_pos: 1.8
  kd_vel: 1.2
  ki_pos: 0.0
  kp_yaw: 1.6
  max_accel_mps2: 4.0
  max_yaw_rate_rps: 1.5

perception:
  backend: classical

estimation:
  pose_filter_alpha: 0.4

runtime:
  max_steps: 450
  replan_every_steps: 3
  output_dir: artifacts/easy
