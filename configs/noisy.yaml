sim:
  dt_s: 0.05
  image_size: [640, 480]
  image_noise_std: 8.0
  occlusion_prob: 0.12
  dynamics_noise_std: 0.08
  camera:
    fx: 420.0
    fy: 420.0
    cx: 320.0
    cy: 240.0
  gates:
    - center_m: [8.0, 0.4, 0.0]
      width_m: 2.0
      height_m: 2.0
      yaw_rad: 0.1
    - center_m: [14.0, -1.6, 0.2]
      width_m: 1.7
      height_m: 1.7
      yaw_rad: -0.35
    - center_m: [20.0, 1.8, -0.1]
      width_m: 1.6
      height_m: 1.6
      yaw_rad: 0.25

mission:
  min_detection_confidence: 0.34
  max_lost_steps: 22
  max_retries: 1
  gate_reached_distance_m: 1.0
  gate_exit_distance_m: 1.5

planning:
  approach_distance_m: 2.3
  exit_distance_m: 1.8
  max_velocity_mps: 2.8
  max_accel_mps2: 2.8
  max_yaw_rate_rps: 1.0
  horizon_s: 4.6
  num_points: 40

control:
  kp_pos: 1.5
  kd_vel: 1.0
  ki_pos: 0.0
  kp_yaw: 1.3
  max_accel_mps2: 3.2
  max_yaw_rate_rps: 1.2

perception:
  backend: classical

estimation:
  pose_filter_alpha: 0.5

runtime:
  max_steps: 850
  replan_every_steps: 2
  output_dir: artifacts/noisy
